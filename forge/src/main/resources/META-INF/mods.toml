# Forge Mods.toml 配置文件
modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "MIT"

[[mods]]
modId = "defiledlands"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
logoFile = "logo.png"
description = '''${mod_description}'''

# Forge 依赖
[[dependencies.defiledlands]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

# Minecraft 版本
[[dependencies.defiledlands]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# TerraBlender - 生物群系注册
[[dependencies.defiledlands]]
modId = "terrablender"
mandatory = true
versionRange = "[3.0.1,)"
ordering = "AFTER"
side = "BOTH"

# Curios API - 饰品栏位（可选）
[[dependencies.defiledlands]]
modId = "curios"
mandatory = false
versionRange = "[5.0.0,)"
ordering = "AFTER"
side = "BOTH"

# JEI - 合成表查看（可选）
[[dependencies.defiledlands]]
modId = "jei"
mandatory = false
versionRange = "[15.0.0,)"
ordering = "AFTER"
side = "CLIENT"
