name: Publish 1.21.1

on:
  workflow_dispatch:
    inputs:
      publish_fabric_mod:
        description: 'Publish Fabric mod to CurseForge/Modrinth'
        type: boolean
        default: false
      publish_neoforge_mod:
        description: 'Publish NeoForge mod to CurseForge/Modrinth'
        type: boolean
        default: false
      publish_maven_fabric:
        description: 'Publish Fabric to Maven'
        type: boolean
        default: false
      publish_maven_neoforge:
        description: 'Publish NeoForge to Maven'
        type: boolean
        default: false
      publish_maven_common:
        description: 'Publish Common to Maven'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build

      - name: Publish Fabric mod to CurseForge/Modrinth
        if: ${{ inputs.publish_fabric_mod }}
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew :fabric:publishMods

      - name: Publish NeoForge mod to CurseForge/Modrinth
        if: ${{ inputs.publish_neoforge_mod }}
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew :neoforge:publishMods

      - name: Publish Common to Maven
        if: ${{ inputs.publish_maven_common }}
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: ./gradlew :common:publish

      - name: Publish Fabric to Maven
        if: ${{ inputs.publish_maven_fabric }}
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: ./gradlew :fabric:publish

      - name: Publish NeoForge to Maven
        if: ${{ inputs.publish_maven_neoforge }}
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: ./gradlew :neoforge:publish

